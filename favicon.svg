<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00ff88"/>
      <stop offset="50%"  stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#7b61ff"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#b59dff"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="32" cy="32" r="31" fill="#0d0d14"/>

  <!-- Gradient ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="url(#ringGrad)" stroke-width="2"/>

  <!-- Small accent dot top-right -->
  <circle cx="53" cy="11" r="2.5" fill="#00ff88" opacity="0.9"/>

  <!-- M letter -->
  <text
    x="10"
    y="42"
    font-family="'Space Mono', monospace"
    font-size="26"
    font-weight="700"
    fill="url(#textGrad)"
    letter-spacing="-1"
  >MS</text>

  <!-- Underline accent -->
  <line x1="10" y1="47" x2="54" y2="47" stroke="url(#ringGrad)" stroke-width="1.5" stroke-linecap="round"/>
</svg>
